spring.config.activate.on-profile=dev
#app.seed.enabled=true
spring.application.version=1.0.0-dev
spring.datasource.driver-class-name=org.postgresql.Driver
spring.r2dbc.url=${SUPABASE_REACTIVE_URL:}
spring.r2dbc.username=${USERNAME}
spring.r2dbc.password=${PASSWORD}
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=${FLYWAY_URL:}
spring.flyway.user=${USERNAME:}
spring.flyway.password=${PASSWORD:}
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=none
jwt.secret=${JWT_SECRET_SERVER}
#spring.main.allow-circular-references=true
spring.cloud.gcp.project-id=${GCS_PROJECT_ID}
spring.cloud.gcp.credentials.location=classpath:casa-store.json
gcs.bucket-name=${GCS_BUCKET}
gcs.subdirectory=casa
# MAIL
spring.mail.host=smtp.hostinger.com
spring.mail.port=465
spring.mail.username=${USERNAME_MAIL}
spring.mail.password=${PASSWORD_MAIL}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.data.redis.host=0.0.0.0
spring.data.redis.port=6379