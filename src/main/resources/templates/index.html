<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SombaCar — API Backend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-mid: #1e3a5f;
            --accent: #38bdf8;
            --accent-soft: rgba(56, 189, 248, 0.15);
            --text: #f8fafc;
            --text-muted: rgba(248, 250, 252, 0.72);
            --border: rgba(255, 255, 255, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            background:
                    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(56, 189, 248, 0.22), transparent),
                    radial-gradient(ellipse 60% 50% at 100% 100%, rgba(30, 58, 95, 0.8), transparent),
                    linear-gradient(160deg, var(--bg-deep) 0%, var(--bg-mid) 55%, #0c4a6e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.25rem;
        }

        .page {
            width: min(560px, 100%);
            text-align: center;
        }

        .brand {
            margin-bottom: 0.35rem;
            font-size: clamp(2.75rem, 10vw, 3.75rem);
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            line-height: 1;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            margin: 0 0 2rem;
            font-size: 1rem;
            font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 0.04em;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            margin-bottom: 1.75rem;
            padding: 0.45rem 0.9rem;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            animation: pulse-glow 2.5s ease-in-out infinite;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.8);
        }

        .animation-wrap {
            position: relative;
            height: 150px;
            margin: 0 auto 2rem;
            max-width: 280px;
        }

        .box {
            position: absolute;
            inset: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 240px;
            height: 150px;
        }

        .comp {
            position: absolute;
            top: 0;
            width: 80px;
            height: 55px;
            border: 3px solid var(--text);
            border-radius: 5px;
        }

        .comp::after {
            content: '';
            position: absolute;
            z-index: 5;
            top: 19px;
            left: 5px;
            width: 65px;
            height: 10px;
            border-radius: 360px;
            border: 3px solid var(--text);
        }

        .loader {
            position: absolute;
            z-index: 5;
            top: 26px;
            left: 12px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: loader 5s infinite linear 0.5s;
        }

        .con {
            position: absolute;
            top: 28px;
            left: 85px;
            width: 100px;
            height: 3px;
            background: var(--text);
            opacity: 0.85;
        }

        .byte {
            position: absolute;
            top: 25px;
            left: 80px;
            height: 9px;
            width: 9px;
            background: var(--accent);
            border-radius: 50%;
            z-index: 6;
            opacity: 0;
            box-shadow: 0 0 8px var(--accent);
            animation: byte_animate 5s infinite linear 0.5s;
        }

        .server {
            position: absolute;
            top: 22px;
            left: 185px;
            width: 35px;
            height: 35px;
            z-index: 1;
            border: 3px solid var(--text);
            background: var(--bg-mid);
            border-radius: 50%;
            transform: rotateX(58deg);
        }

        .server::before {
            content: '';
            position: absolute;
            top: -47px;
            left: -3px;
            width: 35px;
            height: 35px;
            z-index: 20;
            border: 3px solid var(--text);
            background: var(--bg-mid);
            border-radius: 50%;
        }

        .server::after {
            position: absolute;
            top: -26px;
            left: -3px;
            border-left: 3px solid var(--text);
            border-right: 3px solid var(--text);
            width: 35px;
            height: 40px;
            z-index: 17;
            background: var(--bg-mid);
            content: '';
        }

        .stack {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.55rem;
        }

        .stack li {
            padding: 0.4rem 0.85rem;
            border: 1px solid var(--border);
            border-radius: 999px;
            background: var(--accent-soft);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text);
        }

        .footer-note {
            margin-top: 1.5rem;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        @keyframes byte_animate {
            0% { opacity: 0; left: 80px; }
            4% { opacity: 1; }
            46% { opacity: 1; }
            50% { opacity: 0; left: 185px; }
            54% { opacity: 1; }
            96% { opacity: 1; }
            100% { opacity: 0; left: 80px; }
        }

        @keyframes loader {
            0% { width: 8px; }
            100% { width: 63px; }
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.65; }
        }
    </style>
</head>
<body>
<main class="page">
    <h1 class="brand">SombaCar</h1>
    <p class="tagline">Plateforme backend — Spring Boot &amp; Kotlin</p>

    <div class="status">
        <span class="status-dot" aria-hidden="true"></span>
        Serveur opérationnel
    </div>

    <div class="animation-wrap" aria-hidden="true">
        <div class="box">
            <div class="comp"></div>
            <div class="loader"></div>
            <div class="con"></div>
            <div class="byte"></div>
            <div class="server"></div>
        </div>
    </div>

    <ul class="stack">
        <li>Spring Boot</li>
        <li>Kotlin</li>
        <li>PostgreSQL</li>
        <li>JWT</li>
        <li>GC Storage</li>
    </ul>

    <p class="footer-note">API REST · Architecture microservices</p>
</main>
</body>
</html>
